<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Dashboard | DealsNut</title>
    <meta name="description" content="Your DealsNut account dashboard." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='10' fill='%23e35b4f'/><text x='50' y='72' font-family='Arial,sans-serif' font-size='50' font-weight='900' text-anchor='middle' fill='white'>DN</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* Dashboard-specific styles */
      .dashboard-page {
        min-height: 100vh;
        padding: 100px 20px 60px;
        max-width: 900px;
        margin: 0 auto;
      }

      .dashboard-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 16px;
        margin-bottom: 40px;
      }

      .dashboard-welcome h1 {
        font-size: clamp(1.6rem, 4vw, 2.4rem);
        font-weight: 900;
        margin: 0 0 4px;
      }

      .dashboard-welcome p {
        color: var(--muted);
        font-size: 0.9rem;
        margin: 0;
      }

      .role-badge {
        display: inline-block;
        background: var(--coral);
        color: #fff;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        padding: 4px 12px;
        border-radius: 20px;
        text-transform: uppercase;
        margin-top: 8px;
      }

      .role-badge.freelancer {
        background: var(--gold);
        color: #000;
      }

      .dashboard-grid {
        display: grid;
        gap: 24px;
        grid-template-columns: 1fr 1fr;
      }

      @media (max-width: 640px) {
        .dashboard-grid {
          grid-template-columns: 1fr;
        }
      }

      .dash-card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 24px;
      }

      .dash-card h2 {
        font-size: 1rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        margin: 0 0 20px;
        text-transform: uppercase;
        color: var(--muted);
      }

      .profile-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 16px;
      }

      .profile-field label {
        color: var(--muted);
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .profile-field span {
        font-size: 0.95rem;
        font-weight: 500;
      }

      .profile-field input,
      .profile-field select {
        background: rgba(255,255,255,0.06);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: #fff;
        font-family: inherit;
        font-size: 0.95rem;
        outline: none;
        padding: 9px 12px;
        transition: border-color 0.2s ease;
        width: 100%;
      }

      .profile-field input:focus,
      .profile-field select:focus {
        border-color: var(--gold);
      }

      .profile-field select option {
        background: #1a1a1a;
      }

      .edit-toggle {
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--muted);
        cursor: pointer;
        font-family: inherit;
        font-size: 0.82rem;
        font-weight: 600;
        padding: 7px 14px;
        transition: all 0.2s ease;
      }

      .edit-toggle:hover {
        border-color: var(--gold);
        color: var(--gold);
      }

      .dash-card--full {
        grid-column: 1 / -1;
      }

      .orders-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .order-item {
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--line);
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        gap: 12px;
        flex-wrap: wrap;
      }

      .order-name {
        font-weight: 700;
        font-size: 0.9rem;
      }

      .order-price {
        color: var(--gold);
        font-weight: 800;
      }

      .order-status {
        font-size: 0.75rem;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 20px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .order-status.pending   { background: rgba(255,200,0,0.15); color: #ffc800; }
      .order-status.confirmed { background: rgba(0,200,100,0.15); color: #00c864; }
      .order-status.delivered { background: rgba(0,150,255,0.15); color: #0096ff; }
      .order-status.cancelled { background: rgba(255,80,80,0.15);  color: #ff5050; }

      .empty-state {
        color: var(--muted);
        font-size: 0.9rem;
        text-align: center;
        padding: 24px 0;
      }

      .dash-signout {
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--coral);
        cursor: pointer;
        font-family: inherit;
        font-size: 0.85rem;
        font-weight: 700;
        padding: 10px 20px;
        transition: all 0.2s ease;
      }

      .dash-signout:hover {
        background: var(--coral);
        color: #fff;
      }

      .loading-spinner {
        color: var(--muted);
        font-size: 0.9rem;
        text-align: center;
        padding: 60px 20px;
      }

      #save-profile-msg {
        font-size: 0.82rem;
        font-weight: 700;
        margin-top: 8px;
        display: none;
      }
    </style>
  </head>
  <body>
    <!-- Simple header for dashboard -->
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Back to DealsNut home">
        <span class="brand-mark">DN</span>
        <span class="brand-name">DealsNut</span>
      </a>
      <div class="header-right">
        <button id="dash-signout-btn" class="dash-signout">Sign Out</button>
      </div>
    </header>

    <main class="dashboard-page" id="dashboard-main" style="display:none;">
      <!-- Welcome Header -->
      <div class="dashboard-header">
        <div class="dashboard-welcome">
          <h1>Welcome back, <span id="dash-name">there</span>! 👋</h1>
          <p id="dash-email-display"></p>
          <span id="dash-role-badge" class="role-badge">Customer</span>
        </div>
      </div>

      <!-- Dashboard Cards -->
      <div class="dashboard-grid">

        <!-- Profile Card -->
        <div class="dash-card">
          <h2>My Profile <button class="edit-toggle" id="edit-profile-btn" style="float:right; margin-top:-4px;">Edit</button></h2>

          <!-- View Mode -->
          <div id="profile-view">
            <div class="profile-field">
              <label>Full Name</label>
              <span id="view-name">—</span>
            </div>
            <div class="profile-field">
              <label>Phone</label>
              <span id="view-phone">—</span>
            </div>
            <div class="profile-field">
              <label>Role</label>
              <span id="view-role">—</span>
            </div>
          </div>

          <!-- Edit Mode (hidden) -->
          <form id="profile-edit-form" style="display:none;" autocomplete="off">
            <div class="profile-field">
              <label for="edit-name">Full Name</label>
              <input type="text" id="edit-name" placeholder="Your full name" />
            </div>
            <div class="profile-field">
              <label for="edit-phone">Phone</label>
              <input type="tel" id="edit-phone" placeholder="e.g. 9876543210" />
            </div>
            <div class="profile-field">
              <label for="edit-role">I am a...</label>
              <select id="edit-role">
                <option value="customer">Customer</option>
                <option value="freelancer">Freelancer / Student</option>
              </select>
            </div>
            <button type="submit" class="button button--primary" style="width:100%; margin-top:8px;">Save Changes</button>
            <p id="save-profile-msg"></p>
          </form>
        </div>

        <!-- Quick Links Card -->
        <div class="dash-card">
          <h2>Quick Links</h2>
          <div style="display:flex; flex-direction:column; gap:10px;">
            <a href="index.html#shop" class="button button--ghost" style="text-align:center;">🛍️ Browse Shop</a>
            <a href="https://www.instagram.com/dealsnut_shop/" target="_blank" rel="noreferrer" class="button button--dark" style="text-align:center;">📸 DM on Instagram</a>
            <a href="mailto:dealsnutshop@gmail.com" class="button button--dark" style="text-align:center;">✉️ Email DealsNut</a>
          </div>
        </div>

        <!-- Orders Card -->
        <div class="dash-card dash-card--full">
          <h2>My Orders</h2>
          <div class="orders-list" id="orders-list">
            <div class="empty-state">Loading your orders…</div>
          </div>
        </div>

      </div>
    </main>

    <!-- Loading state -->
    <div class="loading-spinner" id="loading-state">Checking your session…</div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="dashboard.js"></script>
  </body>
</html>
